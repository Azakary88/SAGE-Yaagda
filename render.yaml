services:
  - type: web
    name: sage-yaadga
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn dreppnf_platform.wsgi:application --bind 0.0.0.0:$PORT --timeout 120 --graceful-timeout 30
    healthCheckPath: /health/
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SAGE_ADMIN_USERNAME
        sync: false
      - key: SAGE_ADMIN_EMAIL
        sync: false
      - key: SAGE_ADMIN_PASSWORD
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.8"
