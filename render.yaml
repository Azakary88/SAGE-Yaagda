services:
  - type: web
    name: sage-yaadga
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn dreppnf_platform.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /health/
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.8"
